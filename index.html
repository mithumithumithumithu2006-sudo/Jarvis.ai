<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Advanced Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Helvetica Neue', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #66fcf1;
            --accent-color: #45f3ff;
            --dark-bg: #0b0c10;
            --secondary-bg: #1f2833;
            --text-primary: #c5c6c7;
            --text-light: #e3e3e3;
            --error-color: #ff4545;
            --success-color: #45ff45;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ============== LANDING PAGE STYLES ============== */
        .landing-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(11, 12, 16, 0.95) 0%, rgba(31, 40, 51, 0.5) 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Blobs */
        .landing-page::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(102, 252, 241, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
            pointer-events: none;
        }

        .landing-page::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(69, 243, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 25s infinite ease-in-out reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 60px;
            z-index: 1;
            animation: fadeInDown 0.8s ease;
        }

        .logo-container h1 {
            font-size: 3.5rem;
            color: var(--primary-color);
            text-shadow: 0 0 20px var(--primary-color), 0 0 40px var(--accent-color);
            letter-spacing: 4px;
            font-weight: bold;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .logo-container p {
            font-size: 1.1rem;
            color: var(--text-light);
            opacity: 0.8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from { text-shadow: 0 0 15px var(--primary-color), 0 0 30px var(--primary-color); }
            to { text-shadow: 0 0 25px var(--accent-color), 0 0 50px var(--accent-color); }
        }

        /* ============== SEARCH BAR CONTAINER ============== */
        .search-container {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 600px;
            z-index: 10;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 30px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* ============== MODERN SEARCH BAR (GLASSMORPHISM) ============== */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: rgba(31, 40, 51, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1.5px solid rgba(102, 252, 241, 0.25);
            border-radius: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 
                        0 0 20px rgba(102, 252, 241, 0.1),
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        /* Shimmer effect on hover */
        .search-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
            pointer-events: none;
        }

        .search-bar:hover::before {
            left: 100%;
        }

        /* Focus state */
        .search-bar:focus-within {
            background: rgba(31, 40, 51, 0.6);
            border-color: var(--primary-color);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4),
                        0 0 30px rgba(102, 252, 241, 0.25),
                        inset 0 0 20px rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .search-bar:hover:not(:focus-within) {
            border-color: rgba(102, 252, 241, 0.4);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35),
                        0 0 25px rgba(102, 252, 241, 0.15);
        }

        /* Search input field */
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.05rem;
            outline: none;
            padding: 0 8px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .search-bar input::placeholder {
            color: rgba(197, 198, 199, 0.5);
            font-weight: 400;
        }

        .search-bar input:focus::placeholder {
            color: rgba(197, 198, 199, 0.3);
        }

        /* ============== SEARCH BAR BUTTONS ============== */
        .search-bar-buttons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 1.2rem;
            color: var(--primary-color);
            transition: all 0.25s ease;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(102, 252, 241, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
            pointer-events: none;
        }

        .search-btn:hover::before {
            width: 40px;
            height: 40px;
        }

        .search-btn:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .search-btn:active {
            transform: scale(0.95);
        }

        /* Listening state animation */
        .search-btn.listening {
            animation: pulse-btn 1s infinite;
            color: var(--error-color);
        }

        @keyframes pulse-btn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* ============== QUICK SUGGESTIONS ============== */
        .suggestions-container {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1;
            animation: fadeInUp 0.8s ease 0.5s both;
        }

        .suggestions-title {
            font-size: 0.9rem;
            color: rgba(197, 198, 199, 0.6);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 8px;
        }

        .suggestions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            max-width: 600px;
        }

        .suggestion-chip {
            padding: 12px 20px;
            background: rgba(31, 40, 51, 0.3);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 25px;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .suggestion-chip:hover {
            background: rgba(102, 252, 241, 0.1);
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 252, 241, 0.15);
        }

        .suggestion-chip:active {
            transform: translateY(-1px);
        }

        /* ============== CHAT INTERFACE (Hidden initially) ============== */
        .chat-interface {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .chat-interface.active {
            display: flex;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--secondary-bg);
            background-color: var(--dark-bg);
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color), 0 0 30px var(--accent-color);
            letter-spacing: 3px;
            font-weight: bold;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--success-color);
            margin-left: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background-color: var(--secondary-bg);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .jarvis-message {
            background-color: transparent;
            color: var(--text-light);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid var(--primary-color);
            padding-left: 13px;
        }

        .thinking-message {
            color: var(--primary-color);
            font-style: italic;
        }

        .error-message {
            color: var(--error-color);
            border-left-color: var(--error-color);
        }

        .preview-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: none;
            text-align: center;
        }

        #imagePreview {
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .input-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--dark-bg);
            gap: 10px;
        }

        .input-area {
            display: flex;
            align-items: center;
            background-color: var(--secondary-bg);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 10px 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.15);
            transition: all 0.3s ease;
        }

        .input-area:focus-within {
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.3);
            border-color: var(--accent-color);
        }

        .input-area input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
            padding: 0 10px;
        }

        .input-area input::placeholder {
            color: rgba(197, 198, 199, 0.6);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            font-size: 1.3rem;
            transition: all 0.2s ease;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            transform: scale(1.15);
            background-color: rgba(102, 252, 241, 0.1);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .clip-btn { color: var(--primary-color); margin-right: 5px; }
        .mic-btn { color: var(--primary-color); margin-right: 10px; }
        .send-btn { color: var(--primary-color); }

        .listening-active {
            animation: pulse 1s infinite alternate;
            background-color: rgba(255, 69, 69, 0.2);
        }

        @keyframes pulse {
            from { transform: scale(1); color: var(--primary-color); }
            to { transform: scale(1.2); color: var(--error-color); }
        }

        .info-bar {
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--primary-color);
            padding: 10px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            border-radius: 8px 8px 0 0;
        }

        .hidden {
            display: none !important;
        }

        /* ============== RESPONSIVE DESIGN ============== */
        @media (max-width: 768px) {
            .logo-container h1 {
                font-size: 2.5rem;
            }

            .logo-container p {
                font-size: 0.95rem;
            }

            .search-container {
                width: 95%;
                max-width: none;
            }

            .search-bar {
                padding: 12px 16px;
            }

            .search-bar input {
                font-size: 1rem;
            }

            .suggestions-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 10px;
            }

            .suggestion-chip {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .message {
                max-width: 95%;
            }

            .input-area {
                max-width: 95%;
            }
        }

        @media (max-width: 480px) {
            .logo-container h1 {
                font-size: 2rem;
                letter-spacing: 2px;
            }

            .search-bar {
                padding: 10px 14px;
                gap: 8px;
            }

            .search-bar input {
                font-size: 0.95rem;
            }

            .search-btn {
                padding: 6px 10px;
                font-size: 1.1rem;
            }

            .suggestions-grid {
                grid-template-columns: 1fr;
            }

            .suggestion-chip {
                padding: 10px 14px;
                font-size: 0.9rem;
            }

            .suggestions-container {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Landing Page with Modern Search Bar -->
    <div class="landing-page" id="landingPage">
        <div class="logo-container">
            <h1>JARVIS</h1>
            <p>Your AI Assistant</p>
        </div>

        <div class="search-container">
            <div class="search-bar" id="searchBar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Ask Jarvis anything in any language..."
                    onkeypress="handleSearchKeyPress(event)">
                <div class="search-bar-buttons">
                    <button class="search-btn" id="micBtnLanding" onclick="startVoiceRecognitionLanding()" title="Speak (Ctrl+I)">🎤</button>
                    <button class="search-btn" onclick="initiateChat()" title="Send">➔</button>
                </div>
            </div>
        </div>

        <div class="suggestions-container">
            <div class="suggestions-title">Try asking</div>
            <div class="suggestions-grid">
                <div class="suggestion-chip" onclick="handleSuggestion('Explain quantum computing')">Quantum Computing</div>
                <div class="suggestion-chip" onclick="handleSuggestion('How does AI work?')">How does AI work?</div>
                <div class="suggestion-chip" onclick="handleSuggestion('Code a simple calculator')">Code a Calculator</div>
                <div class="suggestion-chip" onclick="handleSuggestion('Tell me a joke')">Tell me a joke</div>
            </div>
        </div>
    </div>

    <!-- Chat Interface -->
    <div class="chat-interface" id="chatInterface">
        <header>
            <h1>JARVIS <span class="status-indicator"></span></h1>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="message jarvis-message">
                <strong>Jarvis:</strong> Online and ready to assist! 🚀
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="imagePreview" src="" alt="Preview">
            <button class="icon-btn" onclick="clearImagePreview()" title="Remove Image">✕</button>
        </div>

        <div class="info-bar" id="infoBar" style="display: none;"></div>

        <div class="input-container">
            <div class="input-area">
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewFile()">
                <button class="icon-btn clip-btn" onclick="document.getElementById('fileInput').click()" title="Attach Photo">📎</button>
                <input type="text" id="userInput" placeholder="Ask Jarvis anything in any language..." onkeypress="checkEnter(event)">
                <button class="icon-btn mic-btn" id="micBtn" onclick="startVoiceRecognition()" title="Speak (Ctrl+I)">🎤</button>
                <button class="icon-btn send-btn" onclick="handleTextSubmit()" title="Send">➔</button>
            </div>
        </div>
    </div>

    <script>
        // ============== CONFIGURATION ==============
        const CONFIG = {
            API_KEY: 'AIzaSyA_w-VbIPooD7BbDd4PTKAj71Jxga6IMVw',
            API_URL: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',
            CREATOR_NAME: 'Mr. Muthishan',
            LANGUAGES: {
                tamil: { regex: /[\u0B80-\u0BFF]/, lang: 'ta-IN' },
                sinhala: { regex: /[\u0D80-\u0DFF]/, lang: 'si-LK' }
            }
        };

        // ============== STATE MANAGEMENT ==============
        const state = {
            isListening: false,
            isProcessing: false,
            base64Image: "",
            messageHistory: [],
            isInChat: false
        };

        // ============== SPEECH & RECOGNITION ==============
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.speechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = navigator.language || 'en-US';
            recognition.interimResults = false;

            recognition.onstart = () => {
                state.isListening = true;
                updateMicButton();
            };

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript;
                state.isListening = false;
                updateMicButton();
                if (state.isInChat) {
                    processCommand(command);
                } else {
                    document.getElementById('searchInput').value = command;
                    initiateChat();
                }
            };

            recognition.onerror = (event) => {
                state.isListening = false;
                updateMicButton();
                if (state.isInChat) {
                    addMessage("Jarvis", `🔴 Microphone error: ${event.error}. Please try again.`, 'error');
                } else {
                    alert(`Microphone error: ${event.error}`);
                }
            };

            recognition.onend = () => {
                state.isListening = false;
                updateMicButton();
            };
        }

        function updateMicButton() {
            const micBtnLanding = document.getElementById('micBtnLanding');
            const micBtn = document.getElementById('micBtn');
            
            if (state.isListening) {
                if (micBtnLanding) micBtnLanding.classList.add('listening');
                if (micBtn) micBtn.classList.add('listening-active');
            } else {
                if (micBtnLanding) micBtnLanding.classList.remove('listening');
                if (micBtn) micBtn.classList.remove('listening-active');
            }
        }

        function detectLanguage(text) {
            if (CONFIG.LANGUAGES.tamil.regex.test(text)) {
                return CONFIG.LANGUAGES.tamil;
            } else if (CONFIG.LANGUAGES.sinhala.regex.test(text)) {
                return CONFIG.LANGUAGES.sinhala;
            }
            return { lang: navigator.language || 'en-US' };
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            
            const utterThis = new SpeechSynthesisUtterance(text);
            const langConfig = detectLanguage(text);
            utterThis.lang = langConfig.lang;
            utterThis.rate = 1;
            utterThis.pitch = 1;
            
            const voices = synth.getVoices();
            const selectedVoice = voices.find(voice => 
                voice.lang.startsWith(langConfig.lang.split('-')[0])
            );
            
            if (selectedVoice) utterThis.voice = selectedVoice;
            synth.speak(utterThis);
        }

        // ============== LANDING PAGE FUNCTIONS ==============
        function handleSearchKeyPress(event) {
            if (event.key === 'Enter') {
                initiateChat();
            }
        }

        function handleSuggestion(text) {
            document.getElementById('searchInput').value = text;
            initiateChat();
        }

        function initiateChat() {
            const searchInput = document.getElementById('searchInput').value.trim();
            if (!searchInput) return;

            state.isInChat = true;
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('chatInterface').classList.add('active');
            
            processCommand(searchInput);
            document.getElementById('userInput').focus();
        }

        function startVoiceRecognitionLanding() {
            if (!recognition) {
                alert("Your browser doesn't support Speech Recognition.");
                return;
            }
            
            if (state.isListening) {
                recognition.stop();
                return;
            }

            const currentInput = document.getElementById('searchInput').value;
            const langConfig = detectLanguage(currentInput);
            recognition.lang = langConfig.lang;
            recognition.start();
        }

        // ============== MESSAGE HANDLING ==============
        function addMessage(sender, text, type = 'normal') {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            
            if (sender === 'You') {
                messageDiv.classList.add('user-message');
            } else {
                messageDiv.classList.add('jarvis-message');
                if (type === 'thinking') messageDiv.classList.add('thinking-message');
                if (type === 'error') messageDiv.classList.add('error-message');
            }
            
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${escapeHtml(text)}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            state.messageHistory.push({ sender, text, timestamp: new Date() });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== IMAGE HANDLING ==============
        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const preview = document.getElementById('imagePreview');
            const container = document.getElementById('previewContainer');
            
            if (file.size > 5 * 1024 * 1024) {
                addMessage("Jarvis", "⚠️ Image size exceeds 5MB. Please choose a smaller file.", "error");
                return;
            }
            
            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                container.style.display = "block";
                state.base64Image = reader.result.split(',')[1];
                showInfoBar(`Image selected: ${file.name}`);
            };
            reader.onerror = () => {
                addMessage("Jarvis", "❌ Failed to read image file.", "error");
            };
            reader.readAsDataURL(file);
        }

        function clearImagePreview() {
            document.getElementById('previewContainer').style.display = "none";
            document.getElementById('imagePreview').src = "";
            document.getElementById('fileInput').value = "";
            state.base64Image = "";
        }

        function showInfoBar(message) {
            const infoBar = document.getElementById('infoBar');
            infoBar.textContent = message;
            infoBar.style.display = 'block';
            setTimeout(() => {
                infoBar.style.display = 'none';
            }, 3000);
        }

        // ============== VOICE RECOGNITION ==============
        function startVoiceRecognition() {
            if (!recognition) {
                addMessage("Jarvis", "❌ Your browser doesn't support Speech Recognition.", "error");
                return;
            }
            
            if (state.isListening) {
                recognition.stop();
                return;
            }

            const currentInput = document.getElementById('userInput').value;
            const langConfig = detectLanguage(currentInput);
            recognition.lang = langConfig.lang;
            
            recognition.start();
        }

        // ============== KEYBOARD SHORTCUTS ==============
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'i') {
                e.preventDefault();
                if (state.isInChat) {
                    startVoiceRecognition();
                } else {
                    startVoiceRecognitionLanding();
                }
            }
        });

        function checkEnter(event) {
            if (event.key === 'Enter' && !state.isProcessing) {
                handleTextSubmit();
            }
        }

        // ============== INPUT HANDLING ==============
        function handleTextSubmit() {
            const inputField = document.getElementById('userInput');
            const query = inputField.value.trim();
            
            if ((query === "" && state.base64Image === "") || state.isProcessing) {
                return;
            }
            
            processCommand(query || "Analyze this image.");
            inputField.value = "";
        }

        // ============== API CALL ==============
        async function askGemini(promptText, base64Img) {
            const systemInstruction = `You are Jarvis AI, an advanced personal assistant created by ${CONFIG.CREATOR_NAME}. 
Always maintain this identity and respond in the language the user speaks. Be helpful, respectful, and informative.`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: `${promptText}\n\n[System: ${systemInstruction}]` }
                    ]
                }]
            };

            if (base64Img) {
                requestBody.contents[0].parts.push({
                    inlineData: {
                        mimeType: "image/jpeg",
                        data: base64Img
                    }
                });
            }

            try {
                const response = await fetch(`${CONFIG.API_URL}?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error("Invalid API response format");
                }

                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error('API Error:', error);
                return `❌ Sorry, I encountered an error: ${error.message}. Please try again.`;
            }
        }

        // ============== COMMAND PROCESSING ==============
        async function processCommand(command) {
            if (state.isProcessing) return;

            state.isProcessing = true;
            addMessage("You", command);
            let lowerCommand = command.toLowerCase();

            // Special Commands
            if (lowerCommand.includes('code red') || lowerCommand.includes('கோட் ரெட்')) {
                speak("Code Red confirmed. Shutting down Jarvis system. Goodbye!");
                setTimeout(() => {
                    document.body.innerHTML = "<h1 style='color:#ff4545; text-align:center; margin-top:45vh; font-family:sans-serif;'>SYSTEM CLOSED (CODE RED)</h1>";
                }, 2500);
                state.isProcessing = false;
                return;
            }

            if (lowerCommand.includes('who created you') || lowerCommand.includes('created you') || 
                lowerCommand.includes('உருவாக்கியவர்')) {
                const reply = `I was created by the esteemed ${CONFIG.CREATOR_NAME}. 🎯`;
                addMessage("Jarvis", reply);
                speak(reply);
                state.isProcessing = false;
                return;
            }

            // Clear preview and reset image
            clearImagePreview();
            let currentImg = state.base64Image;
            state.base64Image = "";

            // Show thinking message
            const thinkingMsg = "Thinking...";
            addMessage("Jarvis", thinkingMsg, 'thinking');
            
            try {
                const aiReply = await askGemini(command, currentImg);
                
                // Remove thinking message
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.removeChild(chatContainer.lastChild);
                
                addMessage("Jarvis", aiReply);
                speak(aiReply);
            } catch (error) {
                const chatContainer = document.getElementById('chatContainer');
                if (chatContainer.lastChild) {
                    chatContainer.removeChild(chatContainer.lastChild);
                }
                addMessage("Jarvis", `❌ An error occurred: ${error.message}`, 'error');
            }

            state.isProcessing = false;
        }

        // ============== INITIALIZATION ==============
        window.addEventListener('load', () => {
            synth.onvoiceschanged = () => {
                synth.getVoices();
            };
        });
    </script>
</body>
</html>
