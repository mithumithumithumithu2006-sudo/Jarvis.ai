<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI - Advanced Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #66fcf1;
            --accent-color: #45f3ff;
            --dark-bg: #0b0c10;
            --secondary-bg: #1f2833;
            --text-primary: #c5c6c7;
            --text-light: #e3e3e3;
            --error-color: #ff4545;
            --success-color: #45ff45;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--secondary-bg);
            background-color: var(--dark-bg);
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color), 0 0 30px var(--accent-color);
            letter-spacing: 3px;
            font-weight: bold;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--success-color);
            margin-left: 10px;
            animation: blink 1s infinite;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color); }
            to { text-shadow: 0 0 20px var(--accent-color), 0 0 40px var(--accent-color); }
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--secondary-bg);
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background-color: var(--secondary-bg);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .jarvis-message {
            background-color: transparent;
            color: var(--text-light);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid var(--primary-color);
            padding-left: 13px;
        }

        .thinking-message {
            color: var(--primary-color);
            font-style: italic;
        }

        .error-message {
            color: var(--error-color);
            border-left-color: var(--error-color);
        }

        .preview-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: none;
            text-align: center;
        }

        #imagePreview {
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
        }

        .input-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--dark-bg);
            gap: 10px;
        }

        .input-area {
            display: flex;
            align-items: center;
            background-color: var(--secondary-bg);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 10px 20px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.15);
            transition: all 0.3s ease;
        }

        .input-area:focus-within {
            box-shadow: 0 0 25px rgba(102, 252, 241, 0.3);
            border-color: var(--accent-color);
        }

        .input-area input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
            padding: 0 10px;
        }

        .input-area input::placeholder {
            color: rgba(197, 198, 199, 0.6);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            font-size: 1.3rem;
            transition: all 0.2s ease;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            transform: scale(1.15);
            background-color: rgba(102, 252, 241, 0.1);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .clip-btn { color: var(--primary-color); margin-right: 5px; }
        .mic-btn { color: var(--primary-color); margin-right: 10px; }
        .send-btn { color: var(--primary-color); }

        .listening-active {
            animation: pulse 1s infinite alternate;
            background-color: rgba(255, 69, 69, 0.2);
        }

        @keyframes pulse {
            from { transform: scale(1); color: var(--primary-color); }
            to { transform: scale(1.2); color: var(--error-color); }
        }

        .info-bar {
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--primary-color);
            padding: 10px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            border-radius: 8px 8px 0 0;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .message {
                max-width: 95%;
            }

            .input-area {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>JARVIS <span class="status-indicator"></span></h1>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message jarvis-message">
            <strong>Jarvis:</strong> Online and ready to assist! 🚀
        </div>
    </div>

    <div class="preview-container" id="previewContainer">
        <img id="imagePreview" src="" alt="Preview">
        <button class="icon-btn" onclick="clearImagePreview()" title="Remove Image">✕</button>
    </div>

    <div class="info-bar" id="infoBar" style="display: none;"></div>

    <div class="input-container">
        <div class="input-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewFile()">
            <button class="icon-btn clip-btn" onclick="document.getElementById('fileInput').click()" title="Attach Photo">📎</button>
            <input type="text" id="userInput" placeholder="Ask Jarvis anything in any language..." onkeypress="checkEnter(event)">
            <button class="icon-btn mic-btn" id="micBtn" onclick="startVoiceRecognition()" title="Speak (Ctrl+I)">🎤</button>
            <button class="icon-btn send-btn" onclick="handleTextSubmit()" title="Send">➔</button>
        </div>
    </div>

    <script>
        // ============== CONFIGURATION ==============
        const CONFIG = {
            API_KEY: 'AIzaSyBbllOuZyXRDKB5ybGFR6Otze9qLxmfIaA',
            API_URL: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',
            CREATOR_NAME: 'Mr. Muthishan',
            LANGUAGES: {
                tamil: { regex: /[\u0B80-\u0BFF]/, lang: 'ta-IN' },
                sinhala: { regex: /[\u0D80-\u0DFF]/, lang: 'si-LK' }
            }
        };

        // ============== STATE MANAGEMENT ==============
        const state = {
            isListening: false,
            isProcessing: false,
            base64Image: "",
            messageHistory: []
        };

        // ============== SPEECH & RECOGNITION ==============
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.speechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = navigator.language || 'en-US';
            recognition.interimResults = false;

            recognition.onstart = () => {
                state.isListening = true;
                updateMicButton();
            };

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript;
                state.isListening = false;
                updateMicButton();
                processCommand(command);
            };

            recognition.onerror = (event) => {
                state.isListening = false;
                updateMicButton();
                addMessage("Jarvis", `🔴 Microphone error: ${event.error}. Please try again.`, 'error');
            };

            recognition.onend = () => {
                state.isListening = false;
                updateMicButton();
            };
        }

        function updateMicButton() {
            const micBtn = document.getElementById('micBtn');
            if (state.isListening) {
                micBtn.classList.add('listening-active');
            } else {
                micBtn.classList.remove('listening-active');
            }
        }

        function detectLanguage(text) {
            if (CONFIG.LANGUAGES.tamil.regex.test(text)) {
                return CONFIG.LANGUAGES.tamil;
            } else if (CONFIG.LANGUAGES.sinhala.regex.test(text)) {
                return CONFIG.LANGUAGES.sinhala;
            }
            return { lang: navigator.language || 'en-US' };
        }

        function speak(text) {
            if (synth.speaking) synth.cancel();
            
            const utterThis = new SpeechSynthesisUtterance(text);
            const langConfig = detectLanguage(text);
            utterThis.lang = langConfig.lang;
            utterThis.rate = 1;
            utterThis.pitch = 1;
            
            const voices = synth.getVoices();
            const selectedVoice = voices.find(voice => 
                voice.lang.startsWith(langConfig.lang.split('-')[0])
            );
            
            if (selectedVoice) utterThis.voice = selectedVoice;
            synth.speak(utterThis);
        }

        // ============== MESSAGE HANDLING ==============
        function addMessage(sender, text, type = 'normal') {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            
            if (sender === 'You') {
                messageDiv.classList.add('user-message');
            } else {
                messageDiv.classList.add('jarvis-message');
                if (type === 'thinking') messageDiv.classList.add('thinking-message');
                if (type === 'error') messageDiv.classList.add('error-message');
            }
            
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${escapeHtml(text)}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            state.messageHistory.push({ sender, text, timestamp: new Date() });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== IMAGE HANDLING ==============
        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const preview = document.getElementById('imagePreview');
            const container = document.getElementById('previewContainer');
            
            if (file.size > 5 * 1024 * 1024) {
                addMessage("Jarvis", "⚠️ Image size exceeds 5MB. Please choose a smaller file.", "error");
                return;
            }
            
            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                container.style.display = "block";
                state.base64Image = reader.result.split(',')[1];
                showInfoBar(`Image selected: ${file.name}`);
            };
            reader.onerror = () => {
                addMessage("Jarvis", "❌ Failed to read image file.", "error");
            };
            reader.readAsDataURL(file);
        }

        function clearImagePreview() {
            document.getElementById('previewContainer').style.display = "none";
            document.getElementById('imagePreview').src = "";
            document.getElementById('fileInput').value = "";
            state.base64Image = "";
        }

        function showInfoBar(message) {
            const infoBar = document.getElementById('infoBar');
            infoBar.textContent = message;
            infoBar.style.display = 'block';
            setTimeout(() => {
                infoBar.style.display = 'none';
            }, 3000);
        }

        // ============== VOICE RECOGNITION ==============
        function startVoiceRecognition() {
            if (!recognition) {
                addMessage("Jarvis", "❌ Your browser doesn't support Speech Recognition.", "error");
                return;
            }
            
            if (state.isListening) {
                recognition.stop();
                return;
            }

            const currentInput = document.getElementById('userInput').value;
            const langConfig = detectLanguage(currentInput);
            recognition.lang = langConfig.lang;
            
            recognition.start();
        }

        // ============== KEYBOARD SHORTCUTS ==============
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'i') {
                e.preventDefault();
                startVoiceRecognition();
            }
        });

        function checkEnter(event) {
            if (event.key === 'Enter' && !state.isProcessing) {
                handleTextSubmit();
            }
        }

        // ============== INPUT HANDLING ==============
        function handleTextSubmit() {
            const inputField = document.getElementById('userInput');
            const query = inputField.value.trim();
            
            if ((query === "" && state.base64Image === "") || state.isProcessing) {
                return;
            }
            
            processCommand(query || "Analyze this image.");
            inputField.value = "";
        }

        // ============== API CALL ==============
        async function askGemini(promptText, base64Img) {
            const systemInstruction = `You are Jarvis AI, an advanced personal assistant created by ${CONFIG.CREATOR_NAME}. 
Always maintain this identity and respond in the language the user speaks. Be helpful, respectful, and informative.`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: `${promptText}\n\n[System: ${systemInstruction}]` }
                    ]
                }]
            };

            if (base64Img) {
                requestBody.contents[0].parts.push({
                    inlineData: {
                        mimeType: "image/jpeg",
                        data: base64Img
                    }
                });
            }

            try {
                const response = await fetch(`${CONFIG.API_URL}?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error("Invalid API response format");
                }

                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error('API Error:', error);
                return `❌ Sorry, I encountered an error: ${error.message}. Please try again.`;
            }
        }

        // ============== COMMAND PROCESSING ==============
        async function processCommand(command) {
            if (state.isProcessing) return;

            state.isProcessing = true;
            addMessage("You", command);
            let lowerCommand = command.toLowerCase();

            // Special Commands
            if (lowerCommand.includes('code red') || lowerCommand.includes('கோட் ரெட்')) {
                speak("Code Red confirmed. Shutting down Jarvis system. Goodbye!");
                setTimeout(() => {
                    document.body.innerHTML = "<h1 style='color:#ff4545; text-align:center; margin-top:45vh; font-family:sans-serif;'>SYSTEM CLOSED (CODE RED)</h1>";
                }, 2500);
                state.isProcessing = false;
                return;
            }

            if (lowerCommand.includes('who created you') || lowerCommand.includes('created you') || 
                lowerCommand.includes('உருவாக்கியவர்')) {
                const reply = `I was created by the esteemed ${CONFIG.CREATOR_NAME}. 🎯`;
                addMessage("Jarvis", reply);
                speak(reply);
                state.isProcessing = false;
                return;
            }

            // Clear preview and reset image
            clearImagePreview();
            let currentImg = state.base64Image;
            state.base64Image = "";

            // Show thinking message
            const thinkingMsg = "Thinking...";
            addMessage("Jarvis", thinkingMsg, 'thinking');
            
            try {
                const aiReply = await askGemini(command, currentImg);
                
                // Remove thinking message
                const chatContainer = document.getElementById('chatContainer');
                chatContainer.removeChild(chatContainer.lastChild);
                
                addMessage("Jarvis", aiReply);
                speak(aiReply);
            } catch (error) {
                const chatContainer = document.getElementById('chatContainer');
                if (chatContainer.lastChild) {
                    chatContainer.removeChild(chatContainer.lastChild);
                }
                addMessage("Jarvis", `❌ An error occurred: ${error.message}`, 'error');
            }

            state.isProcessing = false;
        }

        // ============== INITIALIZATION ==============
        window.addEventListener('load', () => {
            synth.onvoiceschanged = () => {
                synth.getVoices();
            };
        });
    </script>
</body>
</html>
