<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1f2833;
            background-color: #0b0c10;
        }

        header h1 {
            font-size: 2.2rem;
            color: #66fcf1;
            text-shadow: 0 0 15px #66fcf1, 0 0 30px #45f3ff;
            letter-spacing: 3px;
            font-weight: bold;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #66fcf1, 0 0 20px #66fcf1; }
            to { text-shadow: 0 0 20px #45f3ff, 0 0 40px #45f3ff; }
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .user-message {
            background-color: #1f2833;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .jarvis-message {
            background-color: transparent;
            color: #e3e3e3;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .preview-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            display: none;
        }
        #imagePreview {
            max-height: 80px;
            border-radius: 8px;
            border: 2px solid #66fcf1;
            margin-bottom: 5px;
        }

        .input-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0b0c10;
        }

        .input-area {
            display: flex;
            align-items: center;
            background-color: #1f2833;
            border: 1px solid #45f3ff;
            border-radius: 30px;
            padding: 10px 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.1);
        }

        .input-area input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
            padding: 0 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .icon-btn:hover { transform: scale(1.1); }
        .clip-btn { color: #66fcf1; margin-right: 5px; }
        .mic-btn { color: #66fcf1; margin-right: 10px; }
        .send-btn { color: #66fcf1; }

        .listening-active {
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); color: #66fcf1; }
            to { transform: scale(1.2); color: #ff4545; }
        }
    </style>
</head>
<body>

    <header>
        <h1>JARVIS</h1>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message jarvis-message">
            <strong>Jarvis:</strong> Online...  
        </div>
    </div>

    <div class="preview-container" id="previewContainer">
        <img id="imagePreview" src="" alt="Preview">
    </div>

    <div class="input-container">
        <div class="input-area">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewFile()">
            <button class="icon-btn clip-btn" onclick="document.getElementById('fileInput').click()" title="Attach Photo">📎</button>
            <input type="text" id="userInput" placeholder="Ask Jarvis anything in any language..." onkeypress="checkEnter(event)">
            <button class="icon-btn mic-btn" id="micBtn" onclick="startVoiceRecognition()" title="Speak">🎤</button>
            <button class="icon-btn send-btn" onclick="handleTextSubmit()" title="Send">➔</button>
        </div>
    </div>

    <script>
        // இங்க உங்களுடைய உத்தியோகபூர்வ ஜெமினி API Key-ஐ போடவும்
        const GEMINI_API_KEY ="AIzaSyDjpuRPddMZappHMmRgrSUl3M4ZQ-H82EM"; 
        
        const synth = window.speechSynthesis;
        const SpeechRecognition = window.speechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let base64Image = "";

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = navigator.language || 'en-US'; 
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript;
                document.getElementById('micBtn').classList.remove('listening-active');
                processCommand(command);
            };

            recognition.onerror = () => {
                document.getElementById('micBtn').classList.remove('listening-active');
                addMessage("Jarvis", "Microphone error. Please try again.");
            };
        }

        function speak(text, detectedLanguage = 'en-US') {
            if (synth.speaking) synth.cancel();
            const utterThis = new SpeechSynthesisUtterance(text);
            
            if (/[\u0B80-\u0BFF]/.test(text)) {
                utterThis.lang = 'ta-IN'; 
            } else if (/[\u0D80-\u0DFF]/.test(text)) {
                utterThis.lang = 'si-LK'; 
            } else {
                utterThis.lang = detectedLanguage; 
            }
            
            const voices = synth.getVoices();
            let selectedVoice = voices.find(voice => voice.lang.startsWith(utterThis.lang.split('-')[0]));
            
            if (selectedVoice) utterThis.voice = selectedVoice;
            synth.speak(utterThis);
        }

        function addMessage(sender, text) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(sender === 'You' ? 'user-message' : 'jarvis-message');
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const preview = document.getElementById('imagePreview');
            const container = document.getElementById('previewContainer');
            
            const reader = new FileReader();
            reader.onloadend = function () {
                preview.src = reader.result;
                container.style.display = "block";
                base64Image = reader.result.split(',')[1];
            }
            if (file) reader.readAsDataURL(file);
        }

        function startVoiceRecognition() {
            if (!recognition) { alert("Browser does not support Speech Recognition."); return; }
            document.getElementById('micBtn').classList.add('listening-active');
            
            const currentInput = document.getElementById('userInput').value;
            if (/[\u0B80-\u0BFF]/.test(currentInput)) {
                recognition.lang = 'ta-IN';
            } else {
                recognition.lang = 'en-US'; 
            }
            
            recognition.start();
        }

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'i') {
                e.preventDefault();
                startVoiceRecognition();
            }
        });

        function checkEnter(event) { if (event.key === 'Enter') handleTextSubmit(); }

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleTextSubmit();
            }
        });

        function handleTextSubmit() {
            const inputField = document.getElementById('userInput');
            const query = inputField.value.trim();
            if (query !== "" || base64Image !== "") {
                processCommand(query || "Analyze this image.");
                inputField.value = "";
            }
        }

        async function askGemini(promptText, base64Img) {
            let url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            
            let systemInstruction = "You are Jarvis AI,created by when asked who created you, you must answer 'Mr.Muthishan '. always maintain this identity and respond in the language the user speaks."; 

            let requestBody = {
                contents: [{
                    parts: [
                        { text: promptText + ` \n\n[Instruction: ${systemInstruction}]` }
                    ]
                }]
            };

            if (base64Img) {
                requestBody.contents[0].parts.push({
                    inlineData: {
                        mimeType: "image/jpeg",
                        data: base64Img
                    }
                });
            }

            try {
                let response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });
                let data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error(error);
                return "Sorry, I encountered an error connecting to my server.";
            }
        }

        async function processCommand(command) {
            addMessage("You", command);
            let lowerCommand = command.toLowerCase();

            if (lowerCommand.includes('code red') || lowerCommand.includes('கோட் ரெட்')) {
                speak("Code Red confirmed. Shutting down Jarvis system. Goodbye!");
                setTimeout(() => {
                    document.body.innerHTML = "<h1 style='color:#ff4545; text-align:center; margin-top:45vh; font-family:sans-serif;'>SYSTEM CLOSED (CODE RED)</h1>";
                    window.close();
                }, 2500);
                return;
            }

            if (lowerCommand.includes('created you') || lowerCommand.includes('உருவாக்கியவர்') || lowerCommand.includes('who created you') || lowerCommand.includes('கிரியேட் பண்ணது')) {
                let reply = "என்னை உருவாக்கியவர் பெருமதிப்பிற்குரிய Mr. Muthishan ஆவார். (I was created by Mr. Muthishan.)";
                addMessage("Jarvis", reply);
                speak(reply);
                return;
            }

            document.getElementById('previewContainer').style.display = "none";
            let currentImg = base64Image;
            base64Image = "";
            document.getElementById('fileInput').value = "";

            addMessage("Jarvis", "Thinking / சிந்தித்துக் கொண்டிருக்கிறேன்...");
            
            let aiReply = await askGemini(command, currentImg);
            
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.removeChild(chatContainer.lastChild); 
            
            addMessage("Jarvis", aiReply);
            speak(aiReply);
        }
    </script>
</body>
</html>
